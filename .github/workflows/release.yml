name: release
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v7
      with:
        go-version: '1.25.0'
    - run: make bin/sqlc-gen-java.wasm
    - id: sha256
      run: echo "hash=$(sha256sum bin/sqlc-gen-java.wasm | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
    - env:
        GITHUB_TOKEN: ${{ github.token }}
        HASH: ${{ steps.sha256.outputs.hash }}
      run: |
        cat > notes.md <<EOF
        sha256: \`$HASH\`

        \`\`\`yaml
        plugins:
        - name: java
          wasm:
            url: https://github.com/$GITHUB_REPOSITORY/releases/download/$GITHUB_REF_NAME/sqlc-gen-java.wasm
            sha256: $HASH
        \`\`\`
        EOF
        gh release create "$GITHUB_REF_NAME" \
          bin/sqlc-gen-java.wasm \
          --verify-tag \
          --notes-file notes.md
